let shuffledSongs = [];
let currentIndex = 0;

// Mezclar canciones
function shuffle(array){
for(let i = array.length - 1; i > 0; i--){
const j = Math.floor(Math.random() * (i + 1));
[array[i], array[j]] = [array[j], array[i]];
}
return array;
}

function startShuffle(){
shuffledSongs = shuffle([...songs]);
currentIndex = 0;
}

function loadSong(index){

const song = shuffledSongs[index];

const albumImg = document.getElementById("albumImg");
const audio = document.getElementById("audioPlayer");

albumImg.src = song.img;
document.getElementById("songName").innerText = song.name;
document.getElementById("artistName").innerText = song.artist;

audio.src = song.audio;
audio.play();

// Cuando la imagen termine de cargar
albumImg.onload = function(){

const canvas = document.createElement("canvas");
const ctx = canvas.getContext("2d");

canvas.width = albumImg.width;
canvas.height = albumImg.height;

ctx.drawImage(albumImg, 0, 0, canvas.width, canvas.height);

const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
const data = imageData.data;

let r = 0;
let g = 0;
let b = 0;
let count = 0;

// Saltamos píxeles para que sea más rápido
for(let i = 0; i < data.length; i += 80){
r += data[i];
g += data[i + 1];
b += data[i + 2];
count++;
}

r = Math.floor(r / count);
g = Math.floor(g / count);
b = Math.floor(b / count);

// Creamos el fondo dinámico
document.body.style.background =
document.body.style.background = `
radial-gradient(circle at 50% 40%, 
rgba(${r},${g},${b},0.8) 0%, 
rgba(${r},${g},${b},0.4) 30%, 
#121212 70%)
`;

};

}

function nextSong(){

currentIndex++;

if(currentIndex >= shuffledSongs.length){
startShuffle();
}

loadSong(currentIndex);
}

function prevSong(){

currentIndex--;

if(currentIndex < 0){
currentIndex = shuffledSongs.length - 1;
}

loadSong(currentIndex);
}

// Cuando termina la canción → siguiente automática
document.getElementById("audioPlayer").addEventListener("ended", nextSong);

// Iniciar
startShuffle();
loadSong(currentIndex);

function visualize(){

const bufferLength = analyser.frequencyBinCount;
const dataArray = new Uint8Array(bufferLength);

function animate(){
requestAnimationFrame(animate);

analyser.getByteFrequencyData(dataArray);

let sum = 0;
for(let i = 0; i < bufferLength; i++){
sum += dataArray[i];
}

let average = sum / bufferLength;

// Hace que el fondo pulse con la música
document.body.style.filter = `brightness(${1 + average/200})`;

}

animate();
}

let audioContext;
let analyser;
let source;

document.addEventListener("click", iniciarAudio);

function iniciarAudio(){

if(!audioContext){
audioContext = new (window.AudioContext || window.webkitAudioContext)();
analyser = audioContext.createAnalyser();

const audio = document.getElementById("audioPlayer");
source = audioContext.createMediaElementSource(audio);

source.connect(analyser);
analyser.connect(audioContext.destination);

analyser.fftSize = 256;

visualize();
}

document.removeEventListener("click", iniciarAudio);
}
